
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Public API Dashboard</title>
        <style>
            /* --- CSS STYLING --- */
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f0f2f5;
                margin: 0;
                padding: 20px;
                color: #333;
            }
            h1 {
                text-align: center;
                color: #2c3e50;
            }
            .grid-container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px;
                max-width: 1200px;
                margin: 0 auto;
            }
            .card {
                background: white;
                border-radius: 10px;
                padding: 20px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                transition: transform 0.2s;
            }
            .card:hover {
                transform: translateY(-5px);
            }
            .card-title {
                font-size: 1.2em;
                border-bottom: 2px solid #eee;
                padding-bottom: 10px;
                margin-top: 0;
                color: #007bff;
            }
            .card-content {
                font-size: 1em;
                line-height: 1.6;
            }
            img { max-width: 100%; border-radius: 5px; }
            .error { color: red; font-weight: bold; }
        </style>
    </head>
    <body>

        <h1>Live Public API Dashboard</h1>
        <div class="grid-container">

            <!-- Card 1: Random Country (REST Countries API) -->
            <div class="card">
                <h3 class="card-title">🌍 Random Country</h3>
                <div id="location-data" class="card-content">Loading...</div>
            </div>

            <!-- Card 2: Random Quote (Quotable API) -->
            <div class="card">
                <h3 class="card-title">💬 Inspirational Quote</h3>
                <div id="quote-data" class="card-content">Loading...</div>
            </div>

            <!-- Card 3: Random Dog Image (Dog CEO API) -->
            <div class="card">
                <h3 class="card-title">🐕 Random Dog</h3>
                <div id="dog-data" class="card-content">Loading image...</div>
            </div>

            <!-- Card 4: Activity Suggestion (Bored API) -->
            <div class="card">
                <h3 class="card-title">💡 Bored? Try this</h3>
                <div id="activity-data" class="card-content">Loading...</div>
            </div>

            <!-- Card 5: Bitcoin Price (CoinGecko API) -->
            <div class="card">
                <h3 class="card-title">💰 Bitcoin Price</h3>
                <div id="crypto-data" class="card-content">Loading...</div>
            </div>

            <!-- Card 6: Current Time (Internal Browser API) -->
            <div class="card">
                <h3 class="card-title">⏰ Current Time</h3>
                <div id="time-data" class="card-content">Loading...</div>
            </div>

        </div>

        <script>
            // --- JAVASCRIPT LOGIC ---

            // Helper function to fetch data safely
            async function fetchAPI(url, elementId, processFunction) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);
                    const data = await response.json();
                    document.getElementById(elementId).innerHTML = processFunction(data);
                } catch (error) {
                    const message = error?.message || String(error);
                    document.getElementById(elementId).innerHTML = `<span class="error">Error loading data: ${message}</span>`;
                    console.error(`Error fetching ${url}:`, error);
                }
            }

            // 1. REST Countries API: Gets a random country
            // No API key required. CORS enabled.
            // NOTE: The REST Countries API sometimes rejects the full "all" response; limiting fields avoids that.
            fetchAPI('https://restcountries.com/v3.1/all?fields=name,capital,region', 'location-data', (data) => {
                const country = data[Math.floor(Math.random() * data.length)];
                return `<strong>${country.name.common}</strong><br>Capital: ${country.capital?.[0] || 'N/A'}<br>Region: ${country.region}`;
            });

            // 2. Inspirational Quote
            // Primary source: type.fit (no API key, should be CORS-friendly).
            // If the request fails (network / CORS), fall back to an embedded quote list.
            const fallbackQuotes = [
                { text: 'The only limit to our realization of tomorrow is our doubts of today.', author: 'Franklin D. Roosevelt' },
                { text: 'The best way to predict the future is to create it.', author: 'Peter Drucker' },
                { text: 'You miss 100% of the shots you don’t take.', author: 'Wayne Gretzky' },
                { text: 'Whether you think you can or you think you can’t, you’re right.', author: 'Henry Ford' }
            ];

            async function loadQuote() {
                try {
                    const response = await fetch('https://type.fit/api/quotes');
                    if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);
                    const data = await response.json();
                    const quote = data[Math.floor(Math.random() * data.length)];
                    document.getElementById('quote-data').innerHTML = `"${quote.text}" <br> - <em>${quote.author || 'Unknown'}</em>`;
                } catch (error) {
                    console.warn('Quote API failed, using local fallback.', error);
                    const quote = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                    document.getElementById('quote-data').innerHTML = `"${quote.text}" <br> - <em>${quote.author || 'Unknown'}</em>`;
                }
            }

            loadQuote();

            // 3. Dog CEO API: Fetches a random dog image
            // No API key required. CORS enabled.
            fetchAPI('https://dog.ceo/api/breeds/image/random', 'dog-data', (data) => {
                return `<img src="${data.message}" alt="Random Dog">`;
            });

            // 4. Bored API: Suggests a random activity
            // Fallback to a local list when the API is unreachable (DNS, network, CORS, etc.).
            const fallbackActivities = [
                { activity: 'Take a short walk around the block', type: 'recreational', participants: 1 },
                { activity: 'Read a chapter of a book you own', type: 'education', participants: 1 },
                { activity: 'Try a new recipe', type: 'cooking', participants: 1 },
                { activity: 'Do a 5-minute stretching session', type: 'relaxation', participants: 1 },
                { activity: 'Call a friend you haven\'t spoken to lately', type: 'social', participants: 2 }
            ];

            async function loadActivity() {
                try {
                    const response = await fetch('https://www.boredapi.com/api/activity');
                    if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);
                    const data = await response.json();
                    document.getElementById('activity-data').innerHTML = `Activity: ${data.activity}<br>Type: ${data.type}<br>Participants: ${data.participants}`;
                } catch (error) {
                    console.warn('Bored API failed, using local fallback.', error);
                    const activity = fallbackActivities[Math.floor(Math.random() * fallbackActivities.length)];
                    document.getElementById('activity-data').innerHTML = `Activity: ${activity.activity}<br>Type: ${activity.type}<br>Participants: ${activity.participants}`;
                }
            }

            loadActivity();

            // 5. CoinGecko API: Current Bitcoin price
            // No API key required. CORS enabled. More reliable than CoinDesk.
            fetchAPI('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd,eur', 'crypto-data', (data) => {
                return `Bitcoin USD: $${data.bitcoin.usd.toLocaleString()}<br>Bitcoin EUR: €${data.bitcoin.eur.toLocaleString()}`;
            });

            // 6. Internal Browser API: Clock
            // This does not use an external HTTP request, but the browser's internal API.
            function updateTime() {
                const now = new Date();
                document.getElementById('time-data').innerText = now.toLocaleTimeString();
            }
            setInterval(updateTime, 1000); // Update every second

        </script>
    </body>
    </html>
